<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>스프린트 주자·응원단 🏃</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e8312a;--red-bg:#fff5f5;--red-border:#fecaca;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;
  --purple:#7c3aed;--pink:#db2777;
  --g0:#ffffff;--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;
  --g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;
  --g700:#374151;--g800:#1f2937;--g900:#111827;
  --mono:'JetBrains Mono',monospace;
  --sans:'Pretendard','Noto Sans KR',sans-serif;
  --radius:12px;
}
body{background:#fff;color:var(--g800);font-family:var(--sans);overflow-x:hidden}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--g200);padding:10px 14px;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden}
.hdr-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.hdr-title{font-size:14px;font-weight:800;color:var(--g900);flex-shrink:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:10px;color:var(--g400);margin-left:auto;flex-shrink:0;white-space:nowrap}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--g100);position:sticky;top:49px;z-index:100}
.tab{flex:1;padding:9px 1px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--g400);font-family:var(--sans);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--red);border-bottom-color:var(--red)}

/* CONTENT */
.content{max-width:520px;margin:0 auto;padding:14px 14px 90px}
.content:has(#p-course.active){padding:0}
.pane{display:none}.pane.active{display:block;animation:up .2s ease}
#p-course.active{animation:none}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* SECTION LABEL */
.slabel{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--g400);margin:16px 0 8px}
.slabel:first-child{margin-top:0}

/* ── 응원 지점 탭 ── */
.spot-bar{background:var(--g50);border:1px solid var(--g200);border-radius:var(--radius);padding:12px;margin-bottom:14px}
.spot-bar-label{font-size:11px;font-weight:600;color:var(--g500);margin-bottom:8px}
.spot-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:#fff;border:1.5px solid var(--g200);border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--g600);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.active{background:var(--red);border-color:var(--red);color:#fff}
.chip .ksub{font-size:10px;opacity:.7;margin-left:2px}
.range-row{margin-top:8px;display:none}
.range-row input{width:100%;accent-color:var(--red)}
.range-lbl{font-size:11px;color:var(--g500);text-align:center;margin-top:3px}

/* 타임슬롯 */
.slot{border:1.5px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.slot-hdr{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--g50);border-bottom:1px solid var(--g200)}
.slot-clock{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--g900)}
.slot-range{font-size:10px;color:var(--g400);margin-top:1px}
.slot-cnt{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.rrow{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--g100)}
.rrow:last-child{border-bottom:none}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rinfo{flex:1;min-width:0}
.rname{font-size:14px;font-weight:700;color:var(--g900)}
.rmeta{font-size:10px;color:var(--g400);margin-top:1px}
.rarrival{text-align:right;flex-shrink:0}
.rtime{font-family:var(--mono);font-size:17px;font-weight:700}
.relapsed{font-size:10px;color:var(--g400);margin-top:1px}

.share-btn{width:100%;padding:13px;background:var(--red);border:none;border-radius:var(--radius);color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .2s}
.share-btn:hover{background:#c0201a}
.share-ok{margin-top:8px;padding:9px 12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;font-size:12px;color:var(--green);text-align:center;display:none}

/* ── 주자 탭 ── */
.rcard{background:#fff;border:1.5px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;position:relative}
.rcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rc,var(--red))}
.rcard-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px 8px 16px}
.rcard-emoji{font-size:18px}
.rcard-name{font-size:14px;font-weight:800;color:var(--g900)}
.rcard-sub{font-size:10px;color:var(--g400);margin-top:1px}
.rcard-pace{margin-left:auto;background:var(--g100);border-radius:7px;padding:3px 8px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--g700);white-space:nowrap}
.splits-wrap{display:flex;flex-direction:column;gap:3px;padding:0 12px 8px 16px}
.splits-row{display:flex;gap:4px}
.sc{flex:1;background:var(--g50);border-radius:7px;padding:4px 3px;text-align:center}
.sc-km{font-size:9px;color:var(--g400);margin-bottom:1px}
.sc-time{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--g800)}
.rcard-cheer{display:flex;align-items:center;gap:7px;margin:0 12px 8px 16px;padding:7px 10px;border-radius:8px;background:var(--red-bg);border:1px solid var(--red-border)}
.rcard-cheer-lbl{flex:1;font-size:11px;color:var(--g600)}
.rcard-cheer-time{font-family:var(--mono);font-size:15px;font-weight:700}
.rcard-acts{display:flex;border-top:1px solid var(--g100)}
.ract{flex:1;padding:8px;background:none;border:none;font-family:var(--sans);font-size:11px;color:var(--g500);cursor:pointer;transition:all .15s}
.ract:hover{background:var(--g50);color:var(--g800)}
.ract:first-child{border-right:1px solid var(--g100)}
.ract.danger:hover{color:var(--red)}

/* ── 추가 탭 ── */
.add-form{background:var(--g50);border:1.5px solid var(--g200);border-radius:var(--radius);padding:14px}
.frow{margin-bottom:11px}
.flabel{font-size:11px;font-weight:600;color:var(--g500);margin-bottom:4px;display:block}
.finput{width:100%;padding:9px 11px;background:#fff;border:1.5px solid var(--g200);border-radius:8px;color:var(--g900);font-family:var(--sans);font-size:14px;transition:border-color .15s}
.finput:focus{outline:none;border-color:var(--red)}
.tgl-grp{display:flex;background:#fff;border:1.5px solid var(--g200);border-radius:8px;overflow:hidden}
.tgl{flex:1;padding:8px 4px;background:none;border:none;color:var(--g500);font-family:var(--sans);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;border-right:1px solid var(--g200);line-height:1.2}
.tgl:last-child{border-right:none}
.tgl.active{background:var(--red);color:#fff}
.tgl .sub{font-size:9px;display:block;margin-top:1px;opacity:.7}
.tgl.active .sub{opacity:.8}
.tp-row{display:flex;align-items:center;gap:3px;justify-content:center}
.tpu{display:flex;flex-direction:column;align-items:center;gap:2px}
.tpa{width:36px;height:24px;background:#fff;border:1.5px solid var(--g200);border-radius:6px;color:var(--g500);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tpa:hover{border-color:var(--red);color:var(--red)}
.tpd{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--g900);min-width:44px;text-align:center;line-height:1}
.tpsep{font-size:20px;color:var(--g300);font-family:var(--mono);padding-bottom:14px}
.tplbl{font-size:9px;color:var(--g400)}
.pace-hint{text-align:center;margin-top:7px;font-size:11px;color:var(--g500)}
.pace-hint strong{font-family:var(--mono);color:var(--red);font-size:13px}
.cpick{display:flex;gap:6px;flex-wrap:wrap}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:11px}
.cdot.active{border-color:var(--g800);transform:scale(1.1)}
.add-btn{width:100%;padding:12px;background:var(--red);border:none;border-radius:9px;color:#fff;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .2s}
.add-btn:hover{background:#c0201a}

/* ── 라이브 탭 ── */
/* 상단: 주자 이름 선택 버튼 */
.live-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.live-sel-btn{background:#fff;border:1.5px solid var(--g200);border-radius:20px;padding:5px 12px;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--g600);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.live-sel-btn .dot{width:8px;height:8px;border-radius:50%}
.live-sel-btn.active{border-width:2px}

/* 두 가지 뷰: 개인 뷰 / 전체 현황 */
.live-tabs{display:flex;gap:6px;margin-bottom:12px}
.live-tab{flex:1;padding:8px;background:var(--g50);border:1.5px solid var(--g200);border-radius:8px;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;text-align:center;transition:all .15s}
.live-tab.active{background:var(--red);border-color:var(--red);color:#fff}

/* 개인 뷰 */
.live-person{background:#fff;border:1.5px solid var(--g200);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.live-phdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--g50);border-bottom:1px solid var(--g200)}
.live-pdot{width:10px;height:10px;border-radius:50%}
.live-pname{font-size:14px;font-weight:700}
.live-pmeta{margin-left:auto;font-size:11px;color:var(--g400)}
.lsplit{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--g100)}
.lsplit:last-of-type{border-bottom:none}
.lsplit-emoji{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.lsplit-info{flex:1}
.lsplit-name{font-size:12px;font-weight:600;color:var(--g800)}
.lsplit-exp{font-size:10px;color:var(--g400);margin-top:1px}
.lsplit-input{background:var(--g50);border:1.5px solid var(--g200);border-radius:7px;color:var(--g900);font-family:var(--mono);font-size:12px;padding:6px 7px;width:82px;color-scheme:light;flex-shrink:0;transition:border-color .2s}
.lsplit-input.filled{border-color:var(--green);background:var(--green-bg)}
.proj-bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--green-bg);border-top:1px solid var(--green-border)}
.proj-time{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--green)}
.proj-diff{font-size:11px;font-weight:600;margin-top:2px}
.proj-diff.fast{color:var(--green)}.proj-diff.slow{color:var(--amber)}

/* 전체 현황 — 구간 × 주자 매트릭스 */
.matrix-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px}
.matrix{border-collapse:collapse;font-size:11px;white-space:nowrap;width:100%}
.matrix th{background:var(--g50);border:1px solid var(--g200);padding:6px 8px;font-weight:700;color:var(--g600);text-align:center;position:sticky;top:0}
.matrix th.name-col{position:sticky;left:0;z-index:2;background:var(--g100);text-align:left;min-width:70px}
.matrix td{border:1px solid var(--g100);padding:6px 8px;text-align:center;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--g700);background:#fff}
.matrix td.name-cell{position:sticky;left:0;z-index:1;background:#fff;font-family:var(--sans);font-weight:700;font-size:12px;color:var(--g900);text-align:left;padding-left:10px}
.matrix td.name-cell .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.matrix td.live-cell{background:#f0fdf4;color:var(--green)}
.matrix tr:hover td{background:var(--g50)}
.matrix tr:hover td.name-cell{background:var(--g50)}

/* 코스 지도 — 풀스크린 오버레이 */
#p-course{position:relative;padding:0!important;overflow:hidden}
.map-outer{position:relative;width:100%}
#course-map{height:calc(100dvh - 98px);min-height:400px;width:100%}
.map-overlay-top{position:absolute;top:8px;left:8px;right:8px;z-index:500;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.map-overlay-top>*{pointer-events:auto}
.map-spot-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.map-spot-row::-webkit-scrollbar{display:none}
.map-chip{background:rgba(255,255,255,.93);border:2px solid transparent;border-radius:20px;padding:5px 11px;font-family:var(--sans);font-size:11px;font-weight:700;color:var(--g700);cursor:pointer;white-space:nowrap;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 1px 5px rgba(0,0,0,.18);transition:all .15s;flex-shrink:0}
.map-chip.active{color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.map-chip:hover:not(.active){border-color:var(--red);color:var(--red)}
.map-action-row{display:flex;gap:6px}
.map-btn{flex:1;padding:9px 8px;border:none;border-radius:9px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);transition:all .15s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.map-btn-primary{background:rgba(232,49,42,.93);color:#fff}
.map-btn-primary:active{background:rgba(192,32,26,.97)}
.map-btn-reset{background:rgba(255,255,255,.93);color:var(--g700);flex:0 0 44px;font-size:16px;padding:9px 0}
.map-legend{position:absolute;bottom:8px;left:8px;z-index:500;display:flex;flex-wrap:wrap;gap:5px;background:rgba(255,255,255,.88);backdrop-filter:blur(4px);border-radius:8px;padding:6px 8px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--g600)}
.legline{width:12px;height:3px;border-radius:2px}
.legdot{width:6px;height:6px;border-radius:50%}
.map-toast{position:absolute;bottom:46px;left:50%;transform:translateX(-50%);z-index:600;background:rgba(22,163,74,.93);color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;padding:7px 14px;border-radius:20px;white-space:nowrap;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.2);opacity:0;transition:opacity .3s;pointer-events:none}
.map-toast.show{opacity:1}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--g200);border-radius:2px}

/* ── 타임라인 탭 ── */
.tl-section{margin-bottom:20px}
.tl-group-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;margin-bottom:8px}
.tl-group-title{font-size:14px;font-weight:800;color:#fff}
.tl-group-sub{font-size:11px;color:rgba(255,255,255,0.8);margin-left:auto}
.tl-item{display:flex;gap:0;margin-bottom:0;position:relative}
.tl-line-col{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.tl-dot{width:12px;height:12px;border-radius:50%;border:2.5px solid #fff;flex-shrink:0;margin-top:4px;z-index:1}
.tl-vline{width:2px;flex:1;min-height:16px}
.tl-body{flex:1;padding:0 0 14px 4px}
.tl-time{font-family:var(--mono);font-size:16px;font-weight:700;line-height:1}
.tl-place{font-size:13px;font-weight:700;color:var(--g900);margin-top:2px}
.tl-detail{font-size:11px;color:var(--g500);margin-top:3px;line-height:1.6}
.tl-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-top:4px}
.tl-finish{background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:14px;padding:14px;margin-top:16px;text-align:center}
.tl-finish-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:4px}
.tl-finish-time{font-family:var(--mono);font-size:28px;font-weight:800;color:#fff}
.tl-finish-sub{font-size:11px;color:rgba(255,255,255,0.85);margin-top:3px}
.tl-notice{background:var(--amber-bg);border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:var(--g700);line-height:1.6}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-badge">2026 서하마</span>
  <span class="hdr-title">스프린트 주자·응원단 🏃</span>
  <span class="hdr-sub">4.26(일) · 광화문→상암</span>
</div>

<div class="tabs">
  <button class="tab active" data-pane="p-course">🗺 코스</button>
  <button class="tab" data-pane="p-timeline">👥 응원단</button>
  <button class="tab" data-pane="p-cheer">📍 지점</button>
  <button class="tab" data-pane="p-runners">🏃 주자</button>
  <button class="tab" data-pane="p-live">⏱ 라이브</button>
  <button class="tab" data-pane="p-add">➕ 추가</button>
</div>

<div class="content">

<!-- ══ 응원 지점 탭 ══ -->
<div id="p-cheer" class="pane">
  <div class="spot-bar">
    <div class="spot-bar-label">📍 내 응원 지점</div>
    <div class="spot-chips" id="spot-chips"></div>
    <div class="range-row" id="range-row">
      <input type="range" min="0.5" max="21" step="0.5" id="spot-range" oninput="onRangeChange(this.value)"/>
      <div class="range-lbl" id="range-lbl">10km</div>
    </div>
  </div>
  <div class="slabel" id="cheer-title">📣 도착 예상 시각</div>
  <div id="timeline"></div>
  <button class="share-btn" onclick="shareCheer()">📋 응원 정보 공유</button>
  <div class="share-ok" id="share-ok">✅ 복사됐어! 카톡으로 보내줘 🎉</div>
</div>

<!-- ══ 주자 탭 ══ -->
<div id="p-runners" class="pane">
  <div id="runner-list"></div>
</div>

<!-- ══ 추가 탭 ══ -->
<div id="p-add" class="pane">
  <div class="add-form">
    <div class="frow">
      <label class="flabel">이름 / 닉네임</label>
      <input type="text" class="finput" id="f-name" placeholder="예: 김스프린트" maxlength="10"/>
    </div>
    <div class="frow">
      <label class="flabel">코스</label>
      <div class="tgl-grp" id="f-course">
        <button class="tgl" onclick="fCourse('10k',this)">10K</button>
        <button class="tgl active" onclick="fCourse('half',this)">하프</button>
      </div>
    </div>
    <div class="frow">
      <label class="flabel">그룹</label>
      <div class="tgl-grp" id="f-group"></div>
    </div>
    <div class="frow">
      <label class="flabel">목표 기록</label>
      <div class="tp-row">
        <div class="tpu">
          <button class="tpa" onclick="fAdj('h',1)">▲</button>
          <div class="tpd" id="f-h">01</div>
          <button class="tpa" onclick="fAdj('h',-1)">▼</button>
          <div class="tplbl">시간</div>
        </div>
        <div class="tpsep">:</div>
        <div class="tpu">

const pad=n=>String(Math.floor(Math.abs(n))).padStart(2,'0');
const hms=t=>isFinite(t)&&t>=0?`${pad(t/3600)}:${pad(t%3600/60)}:${pad(t%60)}`:'--:--:--';
const mss=t=>isFinite(t)&&t>=0?`${Math.floor(t/60)}'${pad(t%60)}"`:"--'--\"";
const uid=()=>Math.random().toString(36).slice(2,7);

function startSec(r){
  const c=COURSES[r.course],g=c.groups.find(x=>x.id===r.group);
  return 7*3600+30*60+(g?g.off:0);
}
function clock(sec,r){
  const a=startSec(r)+sec;
  return `${pad(Math.floor(a/3600)%24)}:${pad(Math.floor(a%3600/60))}`;
}
function splits(r){
  const c=COURSES[r.course],goal=r.h*3600+r.m*60+r.s,avg=goal/c.total;
  let el=0;
  return c.pts.map((pt,i)=>{
    if(i===0)return{...pt,sec:0};
    el+=(pt.km-c.pts[i-1].km)*avg;
    return{...pt,sec:el};
  });
}
function interp(km,sps){
  for(let i=1;i<sps.length;i++){
    const a=sps[i-1],b=sps[i];
    if(km>=a.km&&km<=b.km)return a.sec+(km-a.km)/(b.km-a.km)*(b.sec-a.sec);
  }
  return sps[sps.length-1].sec;
}
function projected(r){
  const sp=splits(r),keys=Object.keys(r.actuals||{}).map(Number).filter(k=>k>0&&r.actuals[k]);
  if(!keys.length)return null;
  const last=Math.max(...keys),pt=sp[last];
  if(!pt)return null;
  const[ah,am]=(r.actuals[last]).split(':').map(Number);
  const el=(ah*3600+am*60)-startSec(r);
  if(el<=0)return null;
  return el+(COURSES[r.course].total-pt.km)*(el/pt.km);
}
function sorted(){
  const go={A:0,B:1,C:2,D:3};
  return[...runners].sort((a,b)=>{
    if(a.course!==b.course)return a.course==='half'?-1:1;
    const ga=go[a.group]??9,gb=go[b.group]??9;
    if(ga!==gb)return ga-gb;
    return(a.h*3600+a.m*60+a.s)-(b.h*3600+b.m*60+b.s);
  });
}

function renderTimeline(){
  const sn=SPOTS.find(s=>s.km===mySpot.km),nm=sn?sn.name:mySpot.km+'km';
  document.getElementById('cheer-title').textContent=`📣 ${nm} (${mySpot.km}km) 도착 예상`;
  if(!runners.length){
    document.getElementById('timeline').innerHTML=`<div style="text-align:center;padding:32px;color:var(--g400);font-size:13px">주자 탭에서 먼저 등록해주세요</div>`;
    return;
  }
  const arr=sorted().filter(r=>mySpot.km<=COURSES[r.course].total).map(r=>{
    const sp=splits(r),sec=interp(mySpot.km,sp);
    const absMin=(startSec(r)+sec)/60;
    const col=COLORS[r.colorIdx]||COLORS[0];
    return{r,sec,absMin,col,ck:clock(sec,r),el:hms(sec)};
  });
  const slots={};
  arr.forEach(a=>{
    const k=Math.floor(a.absMin/10)*10;
    const h=Math.floor(k/60)%24,m=k%60;
    const key=`${pad(h)}:${pad(m)}`;
    if(!slots[key])slots[key]={key,h,m,items:[]};
    slots[key].items.push(a);
  });
  document.getElementById('timeline').innerHTML=
    Object.values(slots).sort((a,b)=>a.h*60+a.m-(b.h*60+b.m)).map(sl=>{
      const eh=Math.floor((sl.h*60+sl.m+10)/60)%24,em=(sl.m+10)%60;
      return`<div class="slot">
        <div class="slot-hdr">
          <div><div class="slot-clock">${sl.key}</div><div class="slot-range">${sl.key}~${pad(eh)}:${pad(em)}</div></div>
          <div class="slot-cnt">${sl.items.length}명</div>
        </div>
        ${sl.items.map(a=>`
          <div class="rrow">
            <div class="rdot" style="background:${a.col.c}"></div>
            <div class="rinfo">
              <div class="rname">${a.r.name}</div>
              <div class="rmeta">${COURSES[a.r.course].label}·${a.r.group||'?'}조</div>
              <div class="rmeta" style="margin-top:3px;font-family:var(--mono);font-size:11px;color:var(--g600);font-weight:600">${pad(a.r.h)}:${pad(a.r.m)}:${pad(a.r.s)}</div>
            </div>
            <div class="rarrival">
              <div class="rtime" style="color:${a.col.c}">${a.ck}</div>
              <div class="relapsed">+${a.el}</div>
            </div>
          </div>`).join('')}
      </div>`;
    }).join('');
}

function shareCheer(){
  if(!runners.length){alert('주자를 먼저 등록해주세요!');return;}
  const sn=SPOTS.find(s=>s.km===mySpot.km);
  const nm=sn?sn.name:mySpot.km+'km';
  const lines=[`📣 2026 서하마 응원 계획`,`내 응원 지점: ${nm} (${mySpot.km}km)`,``];
  sorted().forEach(r=>{
    if(mySpot.km>COURSES[r.course].total)return;
    const sec=interp(mySpot.km,splits(r));
    lines.push(`${(COLORS[r.colorIdx]||COLORS[0]).e} ${r.name}(${r.group||'?'}조) → ${clock(sec,r)}`);
  });
  const txt=lines.join('\n');
  navigator.clipboard?.writeText(txt).then(()=>{
    const el=document.getElementById('share-ok');
    el.style.display='block';setTimeout(()=>el.style.display='none',3000);
  })||alert(txt);
}

function renderLive(){
  const sr=sorted();
  if(!sr.length){
    document.getElementById('live-selector').innerHTML='<div style="color:var(--g400);font-size:13px;padding:8px 0">주자를 먼저 등록해주세요</div>';
    document.getElementById('live-person-view').innerHTML='';
    document.getElementById('live-matrix-view').innerHTML='';
    return;
  }
  // 선택된 주자 없으면 첫 번째로
  if(!selectedRunnerId||!runners.find(r=>r.id===selectedRunnerId))
    selectedRunnerId=sr[0].id;

  // 상단 선택 버튼
  document.getElementById('live-selector').innerHTML=sr.map(r=>{
    const col=COLORS[r.colorIdx]||COLORS[0];
    const active=r.id===selectedRunnerId;
    return`<button class="live-sel-btn ${active?'active':''}" style="${active?`border-color:${col.c};color:${col.c}`:''}\" onclick="selectRunner('${r.id}')">
      <div class="dot" style="background:${col.c}"></div>${r.name}
    </button>`;
  }).join('');

  if(liveView==='person') renderPersonView();
  else renderMatrixView();
}

function selectRunner(id){
  selectedRunnerId=id;
  renderLive();
}

function setLiveView(v){
  liveView=v;
  document.getElementById('lt-matrix').classList.toggle('active',v==='matrix');
  document.getElementById('lt-person').classList.toggle('active',v==='person');
  document.getElementById('live-person-view').style.display=v==='person'?'block':'none';
  document.getElementById('live-matrix-view').style.display=v==='matrix'?'block':'none';
  if(v==='person')renderPersonView();
  else renderMatrixView();
}

function renderPersonView(){
  const r=runners.find(x=>x.id===selectedRunnerId);
  if(!r){document.getElementById('live-person-view').innerHTML='';return;}
  const col=COLORS[r.colorIdx]||COLORS[0];
  const sp=splits(r),proj=projected(r),goal=r.h*3600+r.m*60+r.s;
  document.getElementById('live-person-view').innerHTML=`
    <div class="live-person">
      <div class="live-phdr">
        <div class="live-pdot" style="background:${col.c}"></div>
        <div class="live-pname" style="color:${col.c}">${r.name}</div>
        <div class="live-pmeta">${COURSES[r.course].label}·${r.group||'?'}조·목표${pad(r.h)}:${pad(r.m)}</div>
      </div>
      ${sp.map((pt,i)=>`
        <div class="lsplit">
          <span class="lsplit-emoji">${pt.emoji}</span>
          <div class="lsplit-info">
            <div class="lsplit-name">${pt.name}</div>
            <div class="lsplit-exp">예상 ${clock(pt.sec,r)}</div>
          </div>
          <input type="time" class="lsplit-input ${r.actuals&&r.actuals[i]?'filled':''}"
            id="li-${r.id}-${i}" value="${r.actuals&&r.actuals[i]||''}"
            oninput="setActual('${r.id}',${i},this.value)"/>
        </div>`).join('')}
      ${proj?`<div class="proj-bar">
        <div style="font-size:20px">📡</div>
        <div><div class="proj-time">${hms(proj)}</div>
        <div class="proj-diff ${proj<goal?'fast':'slow'}">${proj<goal?'🔥 목표보다 빠름':'⚠️ 목표보다 느림'}</div></div>
      </div>`:''}
    </div>`;
}

function renderMatrixView(){
  const sr=sorted();
  if(!sr.length)return;
  // 구간 헤더: 모든 코스의 pts 합집합
  const allPts=[{sub:'출발',km:0},{sub:'4.5km',km:4.5},{sub:'8km',km:8},{sub:'14km',km:14},{sub:'17km',km:17},{sub:'20km',km:20},{sub:'골인',km:21.0975}];
  document.getElementById('live-matrix-view').innerHTML=`
    <div class="matrix-wrap">
      <table class="matrix">
        <thead><tr>
          <th class="name-col">이름</th>
          ${allPts.map(p=>`<th>${p.sub}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${sr.map(r=>{
            const col=COLORS[r.colorIdx]||COLORS[0];
            const sp=splits(r);
            const proj=projected(r);
            const projSp=proj?buildProjSplits(r,proj):null;
            return`<tr>
              <td class="name-cell"><span class="dot" style="background:${col.c}"></span>${r.name}</td>
              ${allPts.map(p=>{
                if(p.km>COURSES[r.course].total) return`<td style="background:var(--g100);color:var(--g300)">—</td>`;
                const baseSec=interp(p.km,sp);
                const liveSec=projSp?interp(p.km,projSp):null;
                const displaySec=liveSec??baseSec;
                const hasLive=liveSec!==null&&liveSec!==baseSec;
                return`<td class="${hasLive?'live-cell':''}">${clock(displaySec,r)}${hasLive?'<sup style="font-size:8px;color:var(--green)">📡</sup>':''}</td>`;
              }).join('')}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function buildProjSplits(r,projSec){
  const c=COURSES[r.course],avg=projSec/c.total;
  let el=0;
  return c.pts.map((pt,i)=>{if(i===0)return{...pt,sec:0};el+=(pt.km-c.pts[i-1].km)*avg;return{...pt,sec:el};});
}

function setActual(rid,idx,val){
  const r=runners.find(x=>x.id===rid);
  if(!r)return;
  if(!r.actuals)r.actuals={};
  if(val)r.actuals[idx]=val; else delete r.actuals[idx];
  document.getElementById(`li-${rid}-${idx}`)?.classList.toggle('filled',!!val);
  renderPersonView();
  renderMatrixView();
  renderTimeline();
  renderRunners();
}

function kmToLatLng(km) {
  const target = km * 1000;
  for(let i=1;i<CUM.length;i++){
    if(CUM[i]>=target){
      const frac=(target-CUM[i-1])/(CUM[i]-CUM[i-1]);
      return[
        COORDS[i-1][0]+frac*(COORDS[i][0]-COORDS[i-1][0]),
        COORDS[i-1][1]+frac*(COORDS[i][1]-COORDS[i-1][1]),
      ];
    }
  }
  return COORDS[COORDS.length-1];
}

function showRunnersAtSpot(spotKm) {
  if(!leafMap || typeof L === 'undefined') { initMap(); setTimeout(()=>showRunnersAtSpot(spotKm), 800); return; }

  // 기존 주자 마커 제거
  runnerMarkers.forEach(m => leafMap.removeLayer(m));
  runnerMarkers = [];

  if(!runners.length) return;

  const sr = sorted();

  // 기준 시각: spotKm을 통과하는 주자들 중 가장 빠른 주자의 통과 시각
  // → 응원단이 그 지점에 서있을 때 기준 (첫 주자 통과 ~ 마지막 주자 통과 범위)
  const validRunners = sr.filter(r => spotKm <= COURSES[r.course].total);
  if(!validRunners.length) return;

  const passTimes = validRunners.map(r => startSec(r) + interp(spotKm, splits(r)));
  // 첫 주자와 마지막 주자의 중간 시각 사용 (응원 체류 시간 중간)
  const minTime = Math.min(...passTimes);
  const maxTime = Math.max(...passTimes);
  const refAbsSec = (minTime + maxTime) / 2;

  // 그 시각에 각 주자가 몇 km 지점에 있는지 계산
  sr.forEach(r => {
    const col = COLORS[r.colorIdx] || COLORS[0];
    const total = COURSES[r.course].total;
    const goal = r.h*3600+r.m*60+r.s;
    if(goal <= 0) return;

    const elapsed = refAbsSec - startSec(r);
    // 아직 출발 안 한 주자도 표시 (출발선 부근)
    const effectiveElapsed = Math.max(elapsed, 0);
    if(effectiveElapsed > goal + 1800) return;

    const pace = goal / total;
    const km = Math.min(effectiveElapsed / pace, total);
    const [lat, lng] = kmToLatLng(Math.min(km, 21.0975));

    const icon = L.divIcon({
      className: '',
      html: `<div style="background:${col.c};border:2px solid #fff;border-radius:20px;padding:3px 8px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25)">${r.name} <span style="opacity:.8;font-size:9px">${Math.round(km*10)/10}km</span></div>`,
      iconSize: [null, null],
      iconAnchor: [0, 12],
    });
    const marker = L.marker([lat, lng], {icon}).addTo(leafMap);
    runnerMarkers.push(marker);
  });

  // 지도 중심: 응원 지점으로 이동
  const [clat, clng] = kmToLatLng(Math.min(spotKm, 21.0975));
  leafMap.setView([clat, clng], 14, {animate: true});
}

// 지도 탭에서 선택된 응원 지점 km
let mapSelectedSpotKm = null;

function renderMapSpotChips(){
  const el = document.getElementById('map-spot-chips');
  if(!el) return;
  const activeKm = mapSelectedSpotKm ?? mySpot.km;
  el.innerHTML = SPOTS.map(s => {
    const active = activeKm===s.km;
    const col = s.color||'#e8312a';
    const style = active
      ? `background:${col};border-color:${col};color:#fff;box-shadow:0 2px 8px ${col}55`
      : `border-color:transparent`;
    return `<button class="map-chip ${active?'active':''}" style="${style}" onclick="selectMapSpot(${s.km})">${s.name} <span style="opacity:.65;font-size:9px">${s.sub}</span></button>`;
  }).join('');
}

function selectMapSpot(km){
  mapSelectedSpotKm = km;
  renderMapSpotChips();
  if(leafMap){
    const [lat,lng] = kmToLatLng(km);
    leafMap.setView([lat,lng], 14, {animate:true});
  }
  showRunnersAtSpot(km);
  showMapToast('📍 ' + (SPOTS.find(s=>s.km===km)?.name||km+'km') + ' 기준 주자 위치 표시');
}

function onMapSpotBtn(){
  const km = mapSelectedSpotKm ?? mySpot.km;
  showRunnersAtSpot(km);
  showMapToast('📍 ' + (SPOTS.find(s=>s.km===km)?.name||km+'km') + ' 기준 주자 위치 표시');
}

function clearRunnerMarkers(){
  if(leafMap){
    runnerMarkers.forEach(m=>leafMap.removeLayer(m));
    runnerMarkers=[];
  }
  showMapToast('✕ 마커를 초기화했어요');
}

let toastTimer=null;
function showMapToast(msg){
  const el=document.getElementById('map-toast');
  if(!el)return;
  el.textContent=msg;
  el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

function showAllRunnersNow(refKm) {
  const km = refKm ?? mapSelectedSpotKm ?? mySpot.km;
  if(!leafMap || typeof L==='undefined'){
    initMap();
    setTimeout(()=>showAllRunnersNow(km), 900);
    return;
  }
  showRunnersAtSpot(km);
}

function switchTab(pane){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[data-pane="${pane}"]`).classList.add('active');
  document.getElementById(pane).classList.add('active');
  if(pane==='p-cheer'){renderSpotChips();renderTimeline();}
  if(pane==='p-runners')renderRunners();
  if(pane==='p-timeline')renderTimeline_tab();
  if(pane==='p-live')renderLive();
  if(pane==='p-course'){
    initMap();
    renderMapSpotChips();
    setTimeout(()=>{ if(leafMap) leafMap.invalidateSize(); }, 50);
    setTimeout(()=>{ if(leafMap) leafMap.invalidateSize(); }, 300);
  }

let db = null;
let fbInited = false;

function initFirebase() {
  if (fbInited) return;
  fbInited = true;
  // Firebase SDK (compat)
  const scripts = [
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js',
  ];
  let loaded = 0;
  scripts.forEach(src => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => { if (++loaded === scripts.length) onFirebaseReady(); };
    document.head.appendChild(s);
  });
}

function onFirebaseReady() {
  if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
    showSyncBadge('⚠️ Firebase 미설정', '#d97706');
    return;
  }
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();

  // 주자 목록 실시간 수신
  db.ref('runners').on('value', snap => {
    const data = snap.val();
    // 서버 데이터로 로컬 runners 교체 (actuals 포함)
    if (data) {
      runners = Object.values(data);
    } else {
      // DB 비어있으면 PRESET 업로드
      PRESET.forEach((r, i) => {
        const runner = {id:'p'+i, ...r, actuals:{}};
        db.ref('runners/' + runner.id).set(runner);
      });
      return;
    }
    renderSpotChips(); renderTimeline();
    renderRunners(); renderLive();
    showSyncBadge('🔴 실시간 연결됨', '#16a34a');
  });
}

function addRunner() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const runner = {
    id: uid(), name,
    course: formSt.course, group: formSt.group,
    h: formSt.h, m: formSt.m, s: formSt.s,
    colorIdx: formSt.ci, actuals: {}
  };
  formSt.ci = (formSt.ci + 1) % COLORS.length;
  document.getElementById('f-name').value = '';

    db.ref('runners/' + runner.id).set(runner);

  } else {
    runners.push(runner);
    renderRunners(); renderTimeline(); renderLive();
  }
  switchTab('p-runners');
}

// delRunner — 단일 정의
function delRunner(id) {
  const r = runners.find(x => x.id === id);
  if (!r) return;
  if (!confirm(`🗑️ [${r.name}] 주자를 삭제하시겠습니까?`)) return;
  if (db) {
    db.ref('runners/' + id).remove();
  } else {
    runners = runners.filter(x => x.id !== id);
    renderRunners(); renderTimeline(); renderLive();
  }
}

// setActual 오버라이드 (라이브 입력 동기화)
const _origSetActual = setActual;
function setActual(rid, idx, val) {
  const r = runners.find(x => x.id === rid);
  if (!r) return;
  if (!r.actuals) r.actuals = {};
  if (val) r.actuals[idx] = val; else delete r.actuals[idx];
  document.getElementById(`li-${rid}-${idx}`)?.classList.toggle('filled', !!val);
  renderPersonView(); renderMatrixView(); renderTimeline(); renderRunners();
  if (db) {
    if (val) db.ref(`runners/${rid}/actuals/${idx}`).set(val);
    else db.ref(`runners/${rid}/actuals/${idx}`).remove();
  }
}

function showSyncBadge(msg, color) {
  let el = document.getElementById('sync-badge');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-badge';
    el.style.cssText = 'position:fixed;bottom:16px;right:14px;z-index:9999;background:#fff;border:1.5px solid #e5e7eb;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.12);font-family:var(--sans);cursor:pointer';
    el.onclick = () => { if(confirm('Firebase 설정 안내를 보시겠어요?')) alert(setupGuide()); };
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.color = color || '#374151';
}

  return [
    '[ Firebase 무료 설정 방법 ]',

}
